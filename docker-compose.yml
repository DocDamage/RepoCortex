# Repo Cortex - Docker Compose
# Multi-service orchestration for containerized deployment

services:
  # Main LLM Workflow service
  llm-workflow:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: llm-workflow:latest
    container_name: llm-workflow
    environment:
      # API Keys (set these in .env file or environment)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      # ContextLattice Configuration
      # This compose stack expects an external orchestrator endpoint; no bundled
      # contextlattice service is defined in this file.
      - "CONTEXTLATTICE_ORCHESTRATOR_URL=${CONTEXTLATTICE_ORCHESTRATOR_URL:?Set CONTEXTLATTICE_ORCHESTRATOR_URL to a reachable external ContextLattice orchestrator}"
      - CONTEXTLATTICE_ORCHESTRATOR_API_KEY=${CONTEXTLATTICE_ORCHESTRATOR_API_KEY:-}
      # Provider Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-}
      - GLM_BASE_URL=${GLM_BASE_URL:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # MemPalace Configuration
      - MEMPALACE_PALACE_PATH=${MEMPALACE_PALACE_PATH:-/data/mempalace}
      # Toolkit Configuration
      - LLM_WORKFLOW_TOOLKIT_SOURCE=/opt/llm-workflow/module/LLMWorkflow/templates/tools
      - LLM_WORKFLOW_LOG_LEVEL=${LLM_WORKFLOW_LOG_LEVEL:-INFO}
    volumes:
      # Mount current project directory
      - .:/workspace
      # Persistent storage for MemPalace data
      - mempalace-data:/data/mempalace
      # Optional: Mount custom tools
      - ${CUSTOM_TOOLS_PATH:-/dev/null}:/custom-tools:ro
    working_dir: /workspace
    command: ["llmup"]
    # Keep container running for exec access
    stdin_open: true
    tty: true
    networks:
      - llm-network
    depends_on:
      chromadb:
        condition: service_healthy
    # NOTE: To deploy without ChromaDB, comment out depends_on above
    # and set MEMPALACE_PALACE_PATH to an existing ChromaDB persistent directory.
    restart: unless-stopped

  # ChromaDB service for local MemPalace
  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: llm-chromadb
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
      - 'CHROMA_SERVER_CORS_ALLOW_ORIGINS=${CHROMA_CORS_ORIGINS:-["http://localhost:3000"]}'
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chromadb-data:/chroma/chroma
    ports:
      - "${CHROMADB_PORT:-8000}:8000"
    networks:
      - llm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Ollama service for local LLM inference (optional)
  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    networks:
      - llm-network
    # GPU support (optional)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - ollama

# Named volumes for persistent data
volumes:
  mempalace-data:
    driver: local
  chromadb-data:
    driver: local
  ollama-data:
    driver: local

# Network configuration
networks:
  llm-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${LLM_NETWORK_SUBNET:-172.20.0.0/16}
