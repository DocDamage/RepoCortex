name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Tag Version
        id: version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not ($tag -match '^v(\d+\.\d+\.\d+)$')) {
            throw "Tag '$tag' is not valid semver tag format vX.Y.Z"
          }
          $version = $matches[1]
          $manifest = Import-PowerShellDataFile -Path .\module\LLMWorkflow\LLMWorkflow.psd1
          $moduleVersion = [string]$manifest.ModuleVersion
          if ($moduleVersion -ne $version) {
            throw "Tag version '$version' does not match module version '$moduleVersion'."
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Run Security Scans
        shell: powershell
        run: |
          . .\scripts\security\Invoke-SecretScan.ps1
          $secretReport = Invoke-SecretScan -ProjectRoot .

          . .\scripts\security\Invoke-VulnerabilityScan.ps1
          $vulnReport = Invoke-VulnerabilityScan -ProjectRoot .

          . .\scripts\security\Invoke-SBOMBuild.ps1
          $sbomResult = Invoke-SBOMBuild -ProjectRoot .

          . .\scripts\security\Invoke-SecurityBaseline.ps1
          $baselineResult = Invoke-SecurityBaseline -ProjectRoot . -FailOnCritical

          $criticalFindings = $secretReport.summary.critical + $vulnReport.summary.critical + $baselineResult.CriticalCount
          Write-Host "Secret scan critical findings: $($secretReport.summary.critical)"
          Write-Host "Vulnerability scan critical findings: $($vulnReport.summary.critical)"
          Write-Host "SBOM components: $($sbomResult.componentCount)"
          Write-Host "Security baseline critical findings: $($baselineResult.CriticalCount)"

          if ($criticalFindings -gt 0) {
            throw "Critical security findings detected. Release blocked."
          }

      - name: Build Module Archive
        id: package
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stageRoot = Join-Path $env:RUNNER_TEMP "release-stage"
          $moduleStage = Join-Path $stageRoot ("LLMWorkflow\" + $version)
          New-Item -ItemType Directory -Path $moduleStage -Force | Out-Null
          Copy-Item -Path .\module\LLMWorkflow\* -Destination $moduleStage -Recurse -Force

          $signReport = Join-Path $env:RUNNER_TEMP ("LLMWorkflow-" + $version + "-signing.txt")
          $pfxB64 = "${{ secrets.CODESIGN_PFX_BASE64 }}"
          $pfxPassword = "${{ secrets.CODESIGN_PFX_PASSWORD }}"
          $didSign = $false

          if (-not [string]::IsNullOrWhiteSpace($pfxB64) -and -not [string]::IsNullOrWhiteSpace($pfxPassword)) {
            $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($pfxB64))
            $securePass = ConvertTo-SecureString $pfxPassword -AsPlainText -Force
            $cert = Import-PfxCertificate -FilePath $pfxPath -Password $securePass -CertStoreLocation Cert:\CurrentUser\My
            if (-not $cert) {
              throw "Failed to import code signing certificate."
            }
            $didSign = $true
            "code_signing=enabled" | Set-Content -LiteralPath $signReport -Encoding UTF8

            $filesToSign = Get-ChildItem -Path $moduleStage -Recurse -File -Include *.ps1,*.psm1,*.psd1
            foreach ($file in $filesToSign) {
              $sig = Set-AuthenticodeSignature -FilePath $file.FullName -Certificate $cert -TimestampServer "https://timestamp.digicert.com"
              if ($sig.Status -ne "Valid") {
                throw "Signature failed for $($file.FullName): $($sig.Status)"
              }
              "signed $($file.FullName)" | Add-Content -LiteralPath $signReport
            }
          } else {
            throw "Code signing secrets (CODESIGN_PFX_BASE64/CODESIGN_PFX_PASSWORD) are missing. Release blocked."
          }

          $zipPath = Join-Path $env:RUNNER_TEMP ("LLMWorkflow-" + $version + ".zip")
          if (Test-Path -LiteralPath $zipPath) { Remove-Item -LiteralPath $zipPath -Force }
          Compress-Archive -Path (Join-Path $stageRoot "LLMWorkflow") -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLower()
          $hashFile = Join-Path $env:RUNNER_TEMP ("LLMWorkflow-" + $version + ".zip.sha256")
          "$hash  $(Split-Path -Leaf $zipPath)" | Set-Content -LiteralPath $hashFile -Encoding UTF8
          $signedValue = if ($didSign) { "true" } else { "false" }
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "hash_path=$hashFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sign_report_path=$signReport" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "signed=$signedValue" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.hash_path }}
            ${{ steps.package.outputs.sign_report_path }}
