name: Gitleaks

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "15 5 * * 1"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Gitleaks on current tree
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            dir /repo --redact --verbose
