          GLM_BASE_URL=https://example.test/glm
          "@ | Set-Content -LiteralPath (Join-Path $projectRoot ".env") -Encoding UTF8
          Invoke-LLMWorkflowUp `
            -ProjectRoot $projectRoot `
            -SkipDependencyInstall `
