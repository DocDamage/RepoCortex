name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  drift-guard:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Template Drift
        shell: pwsh
        run: |
          ./tools/ci/check-template-drift.ps1

      - name: Validate Compatibility Lock
        shell: pwsh
        run: |
          ./tools/ci/validate-compatibility-lock.ps1

      - name: Validate Documentation Truth
        shell: pwsh
        run: |
          ./tools/ci/validate-docs-truth.ps1

  lint:
    needs: drift-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module InvokeBuild -Force -Scope CurrentUser
          ./tools/build/Invoke-LLMBuild.ps1 -Lint
          Write-Output "PSScriptAnalyzer linting complete. No errors found."

  windows-ci:
    needs: drift-guard
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install chromadb

      - name: Install Module Smoke
        shell: pwsh
        run: |
          Import-Module ./module/LLMWorkflow/LLMWorkflow.psd1 -Force
          $projectRoot = Join-Path $env:RUNNER_TEMP "llmworkflow-smoke"
          if (Test-Path -LiteralPath $projectRoot) {
            Remove-Item -LiteralPath $projectRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $projectRoot -Force | Out-Null
          @"
          OPENAI_API_KEY=test
          GLM_API_KEY=test
          GLM_BASE_URL=https://example.test/glm
          "@ | Set-Content -LiteralPath (Join-Path $projectRoot ".env") -Encoding UTF8
          Invoke-LLMWorkflowUp `
            -ProjectRoot $projectRoot `
            -SkipDependencyInstall `
            -SkipContextVerify `
            -SkipBridgeDryRun
          if (-not (Test-Path -LiteralPath (Join-Path $projectRoot "tools" "codemunch"))) { throw "Missing tools/codemunch" }
          if (-not (Test-Path -LiteralPath (Join-Path $projectRoot "tools" "contextlattice"))) { throw "Missing tools/contextlattice" }
          if (-not (Test-Path -LiteralPath (Join-Path $projectRoot "tools" "memorybridge"))) { throw "Missing tools/memorybridge" }

      - name: Install Pester
        shell: pwsh
        run: |
          $pesterModule = Get-Module -ListAvailable Pester | Sort-Object Version -Descending | Select-Object -First 1
          if (-not $pesterModule) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.5.0
          }

      - name: Run stable release smoke suite
        shell: pwsh
        run: |
          $stableTests = @(
            './tests/LLMWorkflow.Tests.ps1',
            './tests/ModuleExportSurface.Tests.ps1',
            './tests/Primitive.AtomicWrite.Tests.ps1',
            './tests/Primitive.CommandContract.Tests.ps1',
            './tests/Primitive.FileLock.Tests.ps1',
            './tests/Primitive.Journal.Tests.ps1',
            './tests/Primitive.StateFile.Tests.ps1',
            './tests/Primitive.Workspace.Tests.ps1',
            './tests/SecurityBaseline.Tests.ps1',
            './tests/Telemetry.Tests.ps1',
            './tests/Pack.Tests.ps1',
            './tests/PackFramework.Tests.ps1',
            './tests/PolicyEngine.Tests.ps1',
            './tests/RetrievalIntegrity.Tests.ps1',
            './tests/RetrievalProfiles.Tests.ps1',
            './tests/RetrievalBackend.Tests.ps1',
            './tests/GameAssetManifest.Tests.ps1',
            './tests/GeometryNodesParser.Tests.ps1',
            './tests/Governance.Tests.ps1',
            './tests/MarketplaceProvenance.Tests.ps1',
            './tests/MCPGovernance.Tests.ps1',
            './tests/OperatorExperience.Tests.ps1',
            './tests/RPGMakerAssetCatalog.Tests.ps1',
            './tests/ImportPerformance.Tests.ps1',
            './tests/LLMWorkflow.Dashboard.Tests.ps1',
            './tests/LLMWorkflow.HealFunctions.Tests.ps1',
            './tests/MCP.Tests.ps1'
          )
          ./tools/ci/invoke-pester-safe.ps1 -Path $stableTests -CI

      - name: Security Baseline Gate
        shell: pwsh
        run: |
          . ./scripts/security/Invoke-SecurityBaseline.ps1
          Invoke-SecurityBaseline -ProjectRoot . -OutputPath ./security-reports -FailOnCritical

  e2e-integration:
    name: E2E Integration Tests
    needs: windows-ci
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install chromadb

      - name: Install Module
        shell: pwsh
        run: |
          Import-Module ./module/LLMWorkflow/LLMWorkflow.psd1 -Force

      - name: Install Pester
        shell: pwsh
        run: |
          $pesterModule = Get-Module -ListAvailable Pester | Sort-Object Version -Descending | Select-Object -First 1
          if (-not $pesterModule) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.5.0
          }

      - name: Run E2E Integration Tests
        shell: pwsh
        run: |
          Write-Host "Starting E2E Integration Tests with Mock ContextLattice Server..."
          Import-Module ./module/LLMWorkflow/LLMWorkflow.psd1 -Force
          ./tools/ci/invoke-pester-safe.ps1 `
            -Path ./tests/Integration.ContextLattice.Tests.ps1 `
            -CI `
            -Verbosity Detailed `
            -TestResultPath e2e-test-results.xml

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: e2e-test-results.xml
          retention-days: 30
