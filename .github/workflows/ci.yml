  e2e-integration:
    name: E2E Integration Tests
    needs: windows-ci
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install chromadb

      - name: Install Module
        shell: pwsh
        run: |
          Import-Module ./module/LLMWorkflow/LLMWorkflow.psd1 -Force

      - name: Install Pester
        shell: pwsh
        run: |
          $pesterModule = Get-Module -ListAvailable Pester | Sort-Object Version -Descending | Select-Object -First 1
          if (-not $pesterModule) {
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.5.0
          }

      - name: Run E2E Integration Tests
        shell: pwsh
        run: |
          Write-Host "Starting E2E Integration Tests with Mock ContextLattice Server..."
          Import-Module ./module/LLMWorkflow/LLMWorkflow.psd1 -Force
          ./tools/ci/invoke-pester-safe.ps1 `
            -Path ./tests/Integration.ContextLattice.Tests.ps1 `
            -CI `
            -Verbosity Detailed `
            -TestResultPath e2e-test-results.xml

      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: e2e-test-results.xml
          retention-days: 30
