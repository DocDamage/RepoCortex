name: Docker Build and Test

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths:
      - 'Dockerfile*'
      - 'docker/**'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - 'module/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'docker/**'
      - 'docker-compose*.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: docdamage/repocortex

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-linux:
    runs-on: ubuntu-latest
    needs: build-linux
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t llm-workflow:test .

      - name: Test llmver command
        run: |
          docker run --rm llm-workflow:test llmver

      - name: Test llmcheck command
        run: |
          docker run --rm -v $(pwd):/workspace llm-workflow:test llmcheck

      - name: Test Python dependencies
        run: |
          docker run --rm --entrypoint /bin/bash llm-workflow:test -c "python -c 'import chromadb; print(chromadb.__version__)'"
          docker run --rm --entrypoint /bin/bash llm-workflow:test -c "codemunch-pro --version || true"

      - name: Test PowerShell module
        run: |
          docker run --rm llm-workflow:test pwsh -Command "Get-Module LLMWorkflow -ListAvailable"

  docker-compose-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      CONTEXTLATTICE_ORCHESTRATOR_URL: http://127.0.0.1:8075

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d chromadb

      - name: Wait for ChromaDB
        run: |
          set -e
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/v2/heartbeat >/dev/null; then
              echo "ChromaDB is ready! (/api/v2/heartbeat)"
              exit 0
            fi
            if curl -fsS http://localhost:8000/api/v1/heartbeat >/dev/null; then
              echo "ChromaDB is ready! (/api/v1/heartbeat)"
              exit 0
            fi
            if curl -fsS http://localhost:8000/ >/dev/null; then
              echo "ChromaDB is responding! (/)"
              exit 0
            fi
            echo "Waiting for ChromaDB... ($i/30)"
            sleep 2
          done
          echo "ChromaDB did not become ready in time"
          docker compose logs chromadb || true
          exit 1

      - name: Test llm-workflow service
        run: |
          docker compose run --rm llm-workflow llmver

      - name: Cleanup
        if: always()
        run: docker compose down -v

  build-windows:
    runs-on: windows-latest
    if: false  # Disabled - enable when Windows container support is needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows image
        run: |
          docker build -f Dockerfile.windows -t llm-workflow:windows .

      - name: Test Windows image
        run: |
          docker run --rm llm-workflow:windows pwsh -Command "Get-Module LLMWorkflow -ListAvailable"
